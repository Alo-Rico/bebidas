```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Menú Alo Rico - Bebidas</title>

<style>
body { font-family: Arial, sans-serif; background-color: #fefaf0; text-align: center; margin: 0; padding: 0; }
header { margin-top: 20px; }
header img.logo { width: 120px; }
header h1 { font-size: 28px; color: #c24a00; }
header img.icono { width: 60px; }

.menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; padding-bottom: 180px; }

.product {
  width: 180px;
  background: white;
  margin: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  cursor: pointer;
}
.product img { width: 100%; height: 140px; object-fit: contain; }

/* 🔥 BOTONES 3D */
button{
 transition: all 0.15s ease;
 box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}
button:active{
 transform: translateY(3px);
 box-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-flotante {
  color: white;
  border: none;
  padding: 12px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
}

#btnPizza { background:#ffc107; color:black; }
#btnHamburguesas { background:#28a745; }
#btnLomitos { background:#ff5722; }
#btnCarrito { background:#007bff; }

/* 🔥 POPUP IGUAL A PIZZA */
#pedido-flotante{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#fff;
 padding:18px;
 border-radius:15px;
 box-shadow:0 12px 35px rgba(0,0,0,0.25);
 opacity:0;
 transition:all 0.35s ease;
 z-index:9999;
 width:90%;
 max-width:320px;
 text-align:center;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
}

.item-pedido{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:6px 0;
}

.btn-eliminar{
 background:#e53935;
 color:white;
 border:none;
 border-radius:50%;
 width:26px;
 height:26px;
 cursor:pointer;
}

/* POPUP CANTIDAD (sin tocar lógica) */
#popup-cantidad {
 display:none;
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
}
.popup-content { background:white; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Bebidas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar</button>
<button id="btn-enviar">Enviar</button>
</div>

<div id="popup-cantidad">
<div class="popup-content">
<h3 id="popup-nombre"></h3>
<input id="popup-input" type="number" value="1">
<br><br>
<button onclick="confirmarCantidad()">OK</button>
<button onclick="cerrarPopup()">Cancelar</button>
</div>
</div>

<div class="btn-grid">
<button id="btnPizza">PIZZAS</button>
<button id="btnHamburguesas">HAMBURGUESAS</button>
<button id="btnLomitos">LOMITOS</button>
<button id="btnCarrito">MI PEDIDO</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// NAV + AUTO CIERRE
btnPizza.onclick = () => location.href="https://alo-rico.github.io/pizza/";
btnHamburguesas.onclick = () => location.href="https://alo-rico.github.io/hamburguesa/";
btnLomitos.onclick = () => location.href="https://alo-rico.github.io/lomitos/";

btnCarrito.onclick = ()=>{
 const p=document.getElementById("pedido-flotante");
 p.classList.toggle("activo");
 if(p.classList.contains("activo")){
  setTimeout(()=>p.classList.remove("activo"),7000);
 }
};

// LISTEN + BASURERO
onValue(pedidoRef, snap=>{
  const data = snap.val();
  const lista = document.getElementById("lista-pedido");
  const totalTxt = document.getElementById("total-pedido");

  lista.innerHTML="";
  let total=0;

  if(data){
    Object.entries(data).forEach(([key,p])=>{
      total+=p.precio*p.cantidad;

      const li=document.createElement("li");
      li.className="item-pedido";
      li.innerHTML=`
        ${p.cantidad} x ${p.nombre}
        <button class="btn-eliminar">🗑</button>
      `;

      li.querySelector(".btn-eliminar").onclick=()=>{
        remove(ref(db,"pedidos/"+clienteId+"/"+key));
      };

      lista.appendChild(li);
    });
  }

  totalTxt.innerText="Total: Gs. "+total.toLocaleString();
});

// MENU
const res = await fetch("precios-bebidas.json");
const productos = await res.json();

const menu = document.getElementById("menu");

Object.entries(productos).forEach(([n,i])=>{
 const card=document.createElement("div");
 card.className="product";
 card.innerHTML=`<img src="img-bebidas/${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
 card.onclick=()=>abrirPopup(n,i.precio);
 menu.appendChild(card);
});

// POPUP
let seleccionado={};

window.abrirPopup=(n,p)=>{
 seleccionado={nombre:n,precio:p};
 document.getElementById("popup-nombre").innerText=n;
 document.getElementById("popup-cantidad").style.display="flex";
};

window.cerrarPopup=()=> document.getElementById("popup-cantidad").style.display="none";

window.confirmarCantidad=()=>{
 const cant=parseInt(document.getElementById("popup-input").value)||1;
 push(pedidoRef,{...seleccionado,cantidad:cant});
 cerrarPopup();
};

// BORRAR TODO
document.getElementById("btn-borrar").onclick=()=> remove(pedidoRef);

// WHATSAPP
document.getElementById("btn-enviar").onclick=()=>{
 onValue(pedidoRef,snap=>{
  const d=snap.val();
  if(!d) return alert("Vacío");

  let msg="Pedido:\n";
  let total=0;

  Object.values(d).forEach(p=>{
   msg+=`${p.cantidad} x ${p.nombre}\n`;
   total+=p.precio*p.cantidad;
  });

  msg+=`\nTotal: Gs. ${total.toLocaleString()}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
 },{onlyOnce:true});
};
</script>

</body>
</html>
